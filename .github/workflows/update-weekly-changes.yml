name: Update Weekly Rating Changes

on:
  schedule:
    # Runs 30 minutes after the daily roster fetch (update-roster.yml) so
    # this diffs against the same day's freshly fetched roster.
    - cron: "30 10 * * 1"
  workflow_dispatch:

jobs:
  update-weekly-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run weekly parse script
        run: node scripts/parse-weekly.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/guild-roster-weekly-snapshot.json
          git add src/data/parsed-data.json
          git diff --staged --quiet || git commit -m "Update weekly rating changes [automated]"
          git push

      - name: Notify Discord on success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": "✅ Weekly rating changes updated successfully."}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"❗ Weekly rating changes update failed on **${{ github.workflow }}** (run #${{ github.run_number }}). [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
