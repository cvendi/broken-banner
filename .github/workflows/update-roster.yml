name: Update Guild Roster

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  update-roster:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run fetch script
        run: node scripts/fetch.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/guild-roster.json
          git diff --staged --quiet || git commit -m "Update guild roster data [automated]"
          git push

      - name: Notify Discord on success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": "✅ Guild roster updated successfully."}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"❗ Guild roster update failed on **${{ github.workflow }}** (run #${{ github.run_number }}). [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
